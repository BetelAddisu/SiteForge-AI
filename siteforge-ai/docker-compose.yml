version: '3.8'

# =============================================================================
# SiteForge AI - Local Development Stack
# =============================================================================
# This is for local development parity only.
# Production deployments use Supabase Cloud services.

services:
  # Next.js Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - supabase-db
    command: npm run dev

  # Supabase Local (optional alternative to cloud)
  # Uncomment if you prefer local Supabase stack
  # supabase:
  #   image: supabase/supabase-local:latest
  #   ports:
  #     - "6432:5432"  # Postgres
  #     - "3001:3000"  # Studio
  #     - "54321:54321" # API
  #     - "9090:9090"   # Realtime
  # volumes:
  #   - supabase-db-data:/var/lib/postgresql/data
  # environment:
  #   - POSTGRES_PASSWORD=your-super-secret-password
  #   - ANON_KEY=your-anon-key
  #   - SERVICE_ROLE_KEY=your-service-role-key

  # For local development without Supabase cloud:
  # Use a simple PostgreSQL instance
  supabase-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=siteforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local

# Notes:
# - Redis is NOT included in MVP - add if background jobs are needed
# - Worker processes are NOT containerized in MVP
# - Supabase Storage uses cloud storage (not local filesystem)
